<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyLife | פשוט וקל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
            margin: 0;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .btn-action {
            transition: all 0.2s ease;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .breath-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6 animate-in fade-in duration-700">
        
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold text-sky-600 tracking-tight">EasyLife</h1>
            <p class="text-slate-500 font-medium">החיים פשוטים יותר עכשיו.</p>
        </header>

        <!-- Main Card -->
        <main class="card p-8 space-y-8">
            
            <!-- 1. Mood Picker -->
            <section class="text-center">
                <p class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">איך ההרגשה עכשיו?</p>
                <div class="flex justify-around text-3xl">
                    <button onclick="setMood('😊')" class="btn-action hover:grayscale-0 grayscale transition-all">😊</button>
                    <button onclick="setMood('😎')" class="btn-action hover:grayscale-0 grayscale transition-all">😎</button>
                    <button onclick="setMood('😴')" class="btn-action hover:grayscale-0 grayscale transition-all">😴</button>
                    <button onclick="setMood('🤔')" class="btn-action hover:grayscale-0 grayscale transition-all">🤔</button>
                </div>
                <p id="mood-text" class="mt-3 text-xs text-sky-500 font-bold h-4"></p>
            </section>

            <hr class="border-slate-100">

            <!-- 2. The One Thing (Main Goal) -->
            <section>
                <p class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">הדבר הכי חשוב היום</p>
                <div id="goal-display" class="hidden text-center space-y-4">
                    <p id="current-goal" class="text-xl font-bold text-slate-700"></p>
                    <button onclick="clearGoal()" class="text-xs text-slate-400 hover:text-rose-500 transition-colors">
                        <i class="fas fa-check mr-1"></i> סיימתי!
                    </button>
                </div>
                <div id="goal-input-area" class="flex gap-2">
                    <input type="text" id="goal-input" placeholder="מה המטרה שלך?" 
                        class="flex-1 bg-white border border-slate-200 rounded-xl py-3 px-4 focus:ring-2 focus:ring-sky-500/20 outline-none transition-all text-sm">
                    <button onclick="saveGoal()" class="bg-sky-500 text-white px-5 rounded-xl btn-action shadow-lg shadow-sky-500/20">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            </section>

            <hr class="border-slate-100">

            <!-- 3. Calm Button -->
            <section class="text-center">
                <button id="calm-btn" onclick="startBreath()" class="w-full py-4 bg-white border-2 border-sky-100 text-sky-600 rounded-2xl font-bold hover:bg-sky-50 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-wind"></i>
                    דקה של שקט
                </button>
                
                <div id="breath-area" class="hidden space-y-4 mt-2">
                    <div class="w-16 h-16 bg-sky-400 rounded-full mx-auto breath-animation flex items-center justify-center text-white">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <p class="text-xs text-sky-500 font-medium">נשימה עמוקה... <span id="timer">60</span></p>
                </div>
            </section>

        </main>

        <!-- Footer Info -->
        <footer class="text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                <i class="fas fa-shield-alt mr-1"></i> הכל נשמר על המכשיר שלך בלבד
            </p>
        </footer>
    </div>

    <script>
        // Mood Logic
        function setMood(emoji) {
            const messages = {
                '😊': 'איזה כיף! תמשיך ככה.',
                '😎': 'סטייל! הולך להיות יום מעולה.',
                '😴': 'אולי כדאי לקחת הפסקה קצרה?',
                '🤔': 'מחשבות טובות מביאות דברים טובים.'
            };
            document.getElementById('mood-text').textContent = messages[emoji];
            localStorage.setItem('easy_mood', emoji);
        }

        // Goal Logic
        function saveGoal() {
            const input = document.getElementById('goal-input');
            const val = input.value.trim();
            if (!val) return;
            
            localStorage.setItem('easy_goal', val);
            showGoal(val);
        }

        function showGoal(val) {
            document.getElementById('current-goal').textContent = val;
            document.getElementById('goal-display').classList.remove('hidden');
            document.getElementById('goal-input-area').classList.add('hidden');
        }

        function clearGoal() {
            localStorage.removeItem('easy_goal');
            document.getElementById('goal-display').classList.add('hidden');
            document.getElementById('goal-input-area').classList.remove('hidden');
            document.getElementById('goal-input').value = '';
            
            // Effect
            confetti();
        }

        // Breath Logic
        let breathInterval;
        function startBreath() {
            const btn = document.getElementById('calm-btn');
            const area = document.getElementById('breath-area');
            const timerDisplay = document.getElementById('timer');
            
            btn.classList.add('hidden');
            area.classList.remove('hidden');
            
            let timeLeft = 60;
            timerDisplay.textContent = timeLeft;
            
            breathInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(breathInterval);
                    btn.classList.remove('hidden');
                    area.classList.add('hidden');
                    alert("כל הכבוד! חזרה לעניינים ברוגע.");
                }
            }, 1000);
        }

        // Init
        window.onload = () => {
            const savedGoal = localStorage.getItem('easy_goal');
            if (savedGoal) showGoal(savedGoal);
        };

        // Simple Confetti Effect
        function confetti() {
            const colors = ['#0ea5e9', '#6366f1', '#a855f7'];
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.style.position = 'fixed';
                el.style.width = '8px';
                el.style.height = '8px';
                el.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '100vh';
                el.style.borderRadius = '50%';
                el.style.zIndex = '100';
                document.body.appendChild(el);
                
                const anim = el.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(-100vh) rotate(720deg)`, opacity: 0 }
                ], { duration: 2000 + Math.random()*1000, easing: 'ease-out' });
                
                anim.onfinish = () => el.remove();
            }
        }
    </script>
</body>
</html>
