<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH DIMENSION | 3D PRO MAX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 1.5rem;
            pointer-events: auto;
        }

        .shimmer {
            background: linear-gradient(90deg, #ff00ff, #00f2ff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: radial-gradient(circle, #1e1b4b 0%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .power-btn {
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.5);
            transition: all 0.3s ease;
        }

        .power-btn:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 80px rgba(6, 182, 212, 0.8);
        }

        .glitch-text {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="space-y-8 p-10">
            <h1 class="text-8xl font-black italic shimmer tracking-tighter uppercase glitch-text">GLITCH</h1>
            <p class="text-cyan-400 font-bold tracking-[0.5em] uppercase text-sm">Dimension 3.0 • Engine Pro Max</p>
            <button onclick="initExperience()" class="power-btn text-white px-16 py-8 rounded-full text-3xl font-black uppercase tracking-widest active:scale-90">
                שגר אותי! ⚡
            </button>
            <p class="text-slate-500 text-xs italic">שים אוזניות. תגביר ווליום. תתחיל לצעוק.</p>
        </div>
    </div>

    <div id="overlay" class="hidden">
        <div class="flex justify-between items-start">
            <div class="glass p-4 px-8">
                <h2 class="text-2xl font-black text-white italic">GLITCH <span class="text-cyan-400">DIMENSION</span></h2>
                <div class="flex gap-4 mt-2">
                    <div id="mic-label" class="text-[10px] font-bold text-rose-500 uppercase">מיקרופון: לא מחובר</div>
                    <div id="fps" class="text-[10px] font-bold text-emerald-400 uppercase">FPS: 60</div>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-10">
            <div class="glass p-6 text-center space-y-2">
                <p class="text-cyan-400 text-xs font-bold uppercase">Chaos Level</p>
                <div class="w-64 h-2 bg-white/10 rounded-full overflow-hidden">
                    <div id="chaos-bar" class="h-full bg-gradient-to-r from-cyan-500 to-rose-500 transition-all duration-75" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-400">ככל שתצעקו יותר - הממד יתפרק יותר</p>
            </div>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>

    <script>
        let scene, camera, renderer, tunnel, cube, particles;
        let video, videoTexture;
        let analyser, dataArray;
        let clock = new THREE.Clock();

        async function initExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('overlay').classList.remove('hidden');

            // --- 1. Setup Camera & Mic ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Video Texture
                video = document.getElementById('video');
                video.srcObject = stream;
                videoTexture = new THREE.VideoTexture(video);

                // Audio Context
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                document.getElementById('mic-label').textContent = "מיקרופון: פעיל 🎤";
                document.getElementById('mic-label').classList.replace('text-rose-500', 'text-emerald-500');

                initThree();
            } catch (err) {
                alert("חובה לאשר מצלמה ומיקרופון כדי להיכנס לממד!");
                location.reload();
            }
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- 2. The Tunnel (Infinite Neon) ---
            const tunnelGeom = new THREE.CylinderGeometry(10, 10, 100, 32, 1, true);
            const tunnelMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.BackSide,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            tunnel = new THREE.Mesh(tunnelGeom, tunnelMat);
            tunnel.rotation.x = Math.PI / 2;
            scene.add(tunnel);

            // --- 3. The Face Cube (The Boss) ---
            const cubeGeom = new THREE.BoxGeometry(2, 2, 2);
            const cubeMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            cube = new THREE.Mesh(cubeGeom, cubeMat);
            scene.add(cube);

            // --- 4. Particles (Chaos) ---
            const pCount = 5000;
            const pGeom = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 50;
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.1, transparent: true });
            particles = new THREE.Points(pGeom, pMat);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Audio Analysis
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const avg = sum / dataArray.length;
            const chaos = avg / 255;

            // UI Update
            document.getElementById('chaos-bar').style.width = (chaos * 100) + '%';
            if(chaos > 0.3) {
                document.getElementById('chaos-bar').style.boxShadow = `0 0 ${chaos * 50}px #00f2ff`;
            }

            // 1. Move Camera through tunnel
            camera.position.z -= 0.1;
            if (camera.position.z < -20) camera.position.z = 5;

            // 2. Rotate Cube (Face)
            cube.rotation.y += 0.01;
            cube.rotation.x += 0.005;
            
            // 3. React to Sound
            const scale = 1 + chaos * 3;
            cube.scale.set(scale, scale, scale);
            
            // Cube Position jitter
            cube.position.x = Math.sin(time * 10) * chaos;
            cube.position.y = Math.cos(time * 10) * chaos;

            // 4. Color Shift
            const hue = (time * 0.1 + chaos) % 1;
            tunnel.material.color.setHSL(hue, 1, 0.5);
            particles.material.color.setHSL((hue + 0.5) % 1, 1, 0.5);

            // 5. Particles movement
            particles.rotation.z += 0.002 + (chaos * 0.05);
            
            // 6. Camera Glitch Effect
            if (chaos > 0.4) {
                camera.rotation.z = Math.sin(time * 50) * 0.1;
                camera.fov = 75 + Math.random() * 20;
                camera.updateProjectionMatrix();
            } else {
                camera.rotation.z = 0;
                camera.fov = 75;
                camera.updateProjectionMatrix();
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
