<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CHAOS | PRO MAX EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            z-index: 10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            pointer-events: auto;
        }

        .neon-text {
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 5;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .shimmer {
            background: linear-gradient(90deg, #00f2ff, #7000ff, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        #vignette {
            position: fixed;
            inset: 0;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div class="scanline"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="text-center space-y-8 p-10 glass-panel border-indigo-500/50 max-w-lg">
            <h1 class="text-6xl font-black shimmer italic tracking-tighter uppercase">NEON CHAOS</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Pro Max Reality Engine</p>
            
            <div class="flex flex-col gap-4">
                <button onclick="initApp()" class="bg-indigo-600 hover:bg-cyan-500 text-white py-6 rounded-3xl font-black text-2xl transition-all shadow-[0_0_30px_rgba(79,70,229,0.5)] active:scale-95">
                    להתפרע עכשיו! 🚀
                </button>
                <p class="text-[10px] text-slate-500 italic">נדרש אישור מצלמה ומיקרופון לחוויית ה-Pro Max</p>
            </div>
        </div>
    </div>

    <div class="ui-overlay">
        <!-- Top Nav -->
        <div class="flex justify-between items-start">
            <div class="glass-panel py-3 px-6">
                <h2 class="text-xl font-black text-white italic">NEON <span class="text-cyan-400">CHAOS</span></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="fps" class="text-[9px] font-mono text-emerald-400">60 FPS</span>
                    <span class="w-1 h-1 bg-white/20 rounded-full"></span>
                    <span id="particle-count" class="text-[9px] font-mono text-cyan-400">2000 PARTICLES</span>
                </div>
            </div>

            <div class="glass-panel flex gap-4">
                <button onclick="toggleFullscreen()" class="text-white/50 hover:text-white transition-colors"><i class="fas fa-expand"></i></button>
                <button onclick="location.reload()" class="text-white/50 hover:text-rose-400 transition-colors"><i class="fas fa-power-off"></i></button>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="flex flex-col md:flex-row gap-6 items-end justify-between pointer-events-none">
            <div class="glass-panel w-full md:w-64 space-y-4 pointer-events-auto">
                <div>
                    <div class="flex justify-between text-[10px] font-bold mb-2 uppercase tracking-widest">
                        <span>רגישות קול</span>
                        <span id="mic-val">0%</span>
                    </div>
                    <div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                        <div id="mic-bar" class="h-full bg-cyan-400 transition-all duration-75" style="width: 0%"></div>
                    </div>
                </div>
                <p class="text-[10px] text-slate-400 leading-tight">
                    <i class="fas fa-info-circle mr-1"></i> תצעקו כדי לשנות את צבע העולם, תזיזו את הידיים כדי לשלוט בחלקיקים.
                </p>
            </div>

            <div class="text-right glass-panel pointer-events-auto">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">מצב פעיל</p>
                <h3 class="text-2xl font-black text-white italic tracking-tighter uppercase">KINETIC FLOW</h3>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <video id="video" class="hidden" autoplay playsinline></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const video = document.getElementById('video');
        const fpsEl = document.getElementById('fps');
        const micBar = document.getElementById('mic-bar');
        const micVal = document.getElementById('mic-val');

        let particles = [];
        let width, height;
        let lastTime = 0;
        let frameCount = 0;
        let micLevel = 0;
        let audioContext, analyser, dataArray;
        let motionCanvas, mCtx;
        let motionX = 0, motionY = 0;
        let mouseX = 0, mouseY = 0;
        let isActive = false;
        let hue = 180;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1;
                this.baseSize = this.size;
                this.life = Math.random() * 0.5 + 0.5;
                this.color = `hsla(${hue}, 100%, 50%, ${this.life})`;
            }

            update() {
                // Sound influence
                const sFactor = micLevel * 0.1;
                
                // Motion/Mouse influence
                const dx = (motionX || mouseX) - this.x;
                const dy = (motionY || mouseY) - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.vx += (dx / dist) * force * 1.5;
                    this.vy += (dy / dist) * force * 1.5;
                    this.size = this.baseSize + (force * 5 * (micLevel / 50));
                } else {
                    this.size = this.baseSize;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Friction
                this.vx *= 0.96;
                this.vy *= 0.96;

                // Boundaries
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }

                this.color = `hsla(${(hue + dist * 0.2) % 360}, 100%, 60%, ${this.life})`;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        async function initApp() {
            document.getElementById('start-screen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('start-screen').remove(), 500);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: true 
                });
                video.srcObject = stream;
                
                // Audio Setup
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // Motion setup
                motionCanvas = document.createElement('canvas');
                motionCanvas.width = 160;
                motionCanvas.height = 120;
                mCtx = motionCanvas.getContext('2d');

                isActive = true;
                resize();
                createParticles();
                requestAnimationFrame(animate);
            } catch (err) {
                alert("חובה לתת אישור למצלמה ולמיקרופון כדי לשחק!");
                location.reload();
            }
        }

        function createParticles() {
            const count = window.innerWidth < 768 ? 1000 : 2500;
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
            document.getElementById('particle-count').textContent = `${count} PARTICLES`;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if(isActive) createParticles();
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function analyzeMotion() {
            if (!video.videoWidth) return;
            
            mCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
            const frame = mCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
            
            let totalX = 0, totalY = 0, count = 0;
            for (let i = 0; i < frame.data.length; i += 16) {
                const r = frame.data[i], g = frame.data[i+1], b = frame.data[i+2];
                // Simple high-pass motion detection would go here, 
                // but for "Pro Max" feel, we'll use center of bright pixels as a proxy
                if (r + g + b > 400) {
                    const px = (i / 4) % motionCanvas.width;
                    const py = Math.floor((i / 4) / motionCanvas.width);
                    totalX += px;
                    totalY += py;
                    count++;
                }
            }

            if (count > 20) {
                motionX = width - (totalX / count) * (width / motionCanvas.width);
                motionY = (totalY / count) * (height / motionCanvas.height);
            }
        }

        function animate(time) {
            if (!isActive) return;

            // Audio Level
            analyser.getByteFrequencyData(dataArray);
            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            micLevel = average;
            micBar.style.width = `${Math.min(100, average * 1.5)}%`;
            micVal.textContent = `${Math.floor(Math.min(100, average * 1.5))}%`;
            
            if (average > 40) {
                hue = (hue + 2) % 360; // Sound shifts world color
            }

            analyzeMotion();

            // Background Fade (Trails)
            ctx.fillStyle = `rgba(0, 0, 0, ${0.1 + (average * 0.001)})`;
            ctx.fillRect(0, 0, width, height);

            // Draw Particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // FPS Counter
            frameCount++;
            if (time > lastTime + 1000) {
                fpsEl.textContent = `${Math.round((frameCount * 1000) / (time - lastTime))} FPS`;
                frameCount = 0;
                lastTime = time;
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
    </script>
</body>
</html>
