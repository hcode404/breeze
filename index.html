<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH DIMENSION | 3D PRO MAX RECORD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 1.5rem;
            pointer-events: auto;
        }

        .shimmer {
            background: linear-gradient(90deg, #ff00ff, #00f2ff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: radial-gradient(circle, #1e1b4b 0%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .power-btn {
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.5);
            transition: all 0.3s ease;
        }

        .power-btn:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 80px rgba(6, 182, 212, 0.8);
        }

        .record-btn {
            transition: all 0.3s ease;
        }
        .record-btn.active {
            background: #ef4444 !important;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .glitch-text {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="space-y-8 p-10">
            <h1 class="text-8xl font-black italic shimmer tracking-tighter uppercase glitch-text">GLITCH</h1>
            <p class="text-cyan-400 font-bold tracking-[0.5em] uppercase text-sm">Dimension 3.0 • Engine Pro Max</p>
            <button onclick="initExperience()" class="power-btn text-white px-16 py-8 rounded-full text-3xl font-black uppercase tracking-widest active:scale-90">
                שגר אותי! ⚡
            </button>
            <p class="text-slate-500 text-xs italic">שים אוזניות. תגביר ווליום. תתחיל לצעוק.</p>
        </div>
    </div>

    <div id="overlay" class="hidden">
        <div class="flex justify-between items-start">
            <div class="glass p-4 px-8">
                <h2 class="text-2xl font-black text-white italic">GLITCH <span class="text-cyan-400">DIMENSION</span></h2>
                <div class="flex gap-4 mt-2">
                    <div id="mic-label" class="text-[10px] font-bold text-rose-500 uppercase">מיקרופון: לא מחובר</div>
                    <div id="fps" class="text-[10px] font-bold text-emerald-400 uppercase">FPS: 60</div>
                </div>
            </div>

            <button id="record-btn" onclick="toggleRecording()" class="glass p-4 px-8 record-btn bg-white/10 hover:bg-white/20 flex items-center gap-3">
                <i class="fas fa-video text-white" id="record-icon"></i>
                <span class="text-white font-bold uppercase tracking-widest text-sm" id="record-text">הקלט שיגעון</span>
            </button>
        </div>

        <div class="flex justify-center mb-10">
            <div class="glass p-6 text-center space-y-2">
                <p class="text-cyan-400 text-xs font-bold uppercase">Chaos Level</p>
                <div class="w-64 h-2 bg-white/10 rounded-full overflow-hidden">
                    <div id="chaos-bar" class="h-full bg-gradient-to-r from-cyan-500 to-rose-500 transition-all duration-75" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">ככל שתצעקו יותר - הממד יתפרק יותר!</p>
            </div>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>

    <script>
        let scene, camera, renderer, tunnel, cube, particles, noisePlanes = [];
        let video, videoTexture;
        let analyser, dataArray;
        let clock = new THREE.Clock();
        
        // Recording variables
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        async function initExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('overlay').classList.remove('hidden');

            // --- 1. Setup Camera & Mic ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Video Texture
                video = document.getElementById('video');
                video.srcObject = stream;
                videoTexture = new THREE.VideoTexture(video);
                // Wrap texture to repeat on tunnel
                videoTexture.wrapS = THREE.RepeatWrapping;
                videoTexture.wrapT = THREE.RepeatWrapping;
                videoTexture.repeat.set(4, 2);

                // Audio Context
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                document.getElementById('mic-label').textContent = "מיקרופון: פעיל 🎤";
                document.getElementById('mic-label').classList.replace('text-rose-500', 'text-emerald-500');

                initThree();
            } catch (err) {
                alert("חובה לאשר מצלמה ומיקרופון כדי להיכנס לממד!");
                location.reload();
            }
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- 2. The Tunnel (Now with Video Walls!) ---
            const tunnelGeom = new THREE.CylinderGeometry(15, 15, 200, 32, 10, true);
            const tunnelMat = new THREE.MeshBasicMaterial({
                map: videoTexture,
                side: THREE.BackSide,
                transparent: true,
                opacity: 0.6
            });
            tunnel = new THREE.Mesh(tunnelGeom, tunnelMat);
            tunnel.rotation.x = Math.PI / 2;
            scene.add(tunnel);

            // --- 3. Multiple Face Cubes (Chaos!) ---
            const cubeGeom = new THREE.BoxGeometry(2, 2, 2);
            const cubeMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            cube = new THREE.Mesh(cubeGeom, cubeMat);
            scene.add(cube);

            // Add additional glitchy shards
            for(let i=0; i<15; i++) {
                const shardGeom = new THREE.PlaneGeometry(3, 3);
                const shardMat = new THREE.MeshBasicMaterial({ 
                    map: videoTexture, 
                    transparent: true, 
                    opacity: 0.5,
                    side: THREE.DoubleSide
                });
                const shard = new THREE.Mesh(shardGeom, shardMat);
                shard.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 40
                );
                shard.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                noisePlanes.push(shard);
                scene.add(shard);
            }

            // --- 4. Particles (More Chaos) ---
            const pCount = 10000;
            const pGeom = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 80;
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.08, transparent: true });
            particles = new THREE.Points(pGeom, pMat);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function toggleRecording() {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('record-icon');
            const text = document.getElementById('record-text');
            
            if (!isRecording) {
                // Start Recording
                recordedChunks = [];
                const stream = renderer.domElement.captureStream(60);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'glitch-dimension-pro-max.webm';
                    a.click();
                };
                
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('active');
                text.textContent = 'עצור הקלטה';
            } else {
                // Stop Recording
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('active');
                text.textContent = 'הקלט שיגעון';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Audio Analysis
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const avg = sum / dataArray.length;
            const chaos = avg / 255;

            // UI Update
            document.getElementById('chaos-bar').style.width = (chaos * 100) + '%';
            if(chaos > 0.3) {
                document.getElementById('chaos-bar').style.boxShadow = `0 0 ${chaos * 60}px #00f2ff`;
            }

            // 1. Zoom through tunnel
            camera.position.z -= (0.2 + chaos * 1.5);
            if (camera.position.z < -40) camera.position.z = 10;
            
            // Texture offset for movement effect
            videoTexture.offset.y += 0.01 + chaos * 0.1;

            // 2. Main Cube behavior
            cube.rotation.y += 0.02 + chaos;
            cube.rotation.z += 0.01;
            const scale = 1.5 + chaos * 5;
            cube.scale.set(scale, scale, scale);
            cube.position.x = Math.sin(time * 15) * chaos * 5;
            cube.position.y = Math.cos(time * 15) * chaos * 5;

            // 3. Shards/Planes behavior
            noisePlanes.forEach((shard, i) => {
                shard.rotation.x += 0.01 * (i % 3 + 1);
                shard.rotation.y += 0.02;
                shard.position.z += 0.1 + chaos * 0.5;
                if(shard.position.z > 10) shard.position.z = -40;
                
                const s = 1 + chaos * 4;
                shard.scale.set(s, s, s);
            });

            // 4. Color & Fog Shift
            const hue = (time * 0.15 + chaos * 0.5) % 1;
            tunnel.material.color.setHSL(hue, 1, 0.5);
            particles.material.color.setHSL((hue + 0.3) % 1, 1, 0.6);
            scene.fog.color.setHSL((hue + 0.7) % 1, 0.5, 0.1);

            // 5. Particles movement (Whirlpool)
            particles.rotation.z += 0.005 + (chaos * 0.2);
            particles.position.z = Math.sin(time) * 2;
            
            // 6. Camera Glitch Effect (Heavy)
            if (chaos > 0.45) {
                camera.rotation.z = (Math.random() - 0.5) * chaos * 0.5;
                camera.fov = 60 + Math.random() * 60;
                camera.updateProjectionMatrix();
                
                // Rapid RGB/Position shifts
                renderer.setClearColor(new THREE.Color().setHSL(Math.random(), 1, 0.2), 0.1);
            } else {
                camera.rotation.z = 0;
                camera.fov = 75;
                camera.updateProjectionMatrix();
                renderer.setClearColor(0x000000, 1);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
